# Site settings
title: "Ctrl + Alt + Reflect"
description: "Building systems like forests — resilient, interconnected, alive."
author: arborlin
email: hello@arborlin.dev

# Social links
social:
  github: arborlin-dev
  website: https://arborlin-dev.github.io/ctrl-alt-reflect/
  # twitter: your_twitter
  # linkedin: your_linkedin

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Collections
collections:
  engineering:
    output: true
    permalink: /:collection/:name/
  management:
    output: true
    permalink: /:collection/:name/
  meta:
    output: true
    permalink: /:collection/:name/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "engineering"
    values:
      layout: "page"
      category: "engineering"
  - scope:
      path: ""
      type: "management"
    values:
      layout: "page"
      category: "management"
  - scope:
      path: ""
      type: "meta"
    values:
      layout: "page"
      category: "meta"

# Navigation
nav:
  - title: "首页"
    url: "/"
  - title: "工程"
    url: "/engineering/"
  - title: "管理"
    url: "/management/"
  - title: "元认知"
    url: "/meta/"
  - title: "周记"
    url: "/weeknotes/"
  - title: "关于"
    url: "/about/"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - README.md

# GitHub Pages 兼容（可选）
# theme: minima
# remote_theme: pages-themes/cayman@v0.2.0
